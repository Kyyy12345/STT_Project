<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STT 테스트 도구</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f6f9; }
        .container { background: white; max-width: 560px; margin: 0 auto 30px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; }
        textarea { width: 100%; height: 100px; margin-bottom: 16px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; }
        button { background: #4CAF50; color: white; border: none; padding: 11px 20px; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .status { margin-top: 14px; color: #555; font-size: 14px; min-height: 20px; }

        /* 파일 선택 */
        .file-row { margin-bottom: 16px; }
        .file-row input[type="file"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }

        /* 결과 카드 */
        .result-box { display: none; margin-top: 24px; text-align: left; }
        .result-box h3 { font-size: 13px; color: #999; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .result-card { border-radius: 8px; overflow: hidden; border: 1px solid #e8e8e8; }
        .result-row { display: flex; align-items: flex-start; padding: 14px 16px; gap: 12px; }
        .result-row:not(:last-child) { border-bottom: 1px solid #f0f0f0; }
        .result-row:first-child { background: #f8f9ff; }
        .result-row:last-child  { background: #f8fff8; }
        .lang-badge {
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 12px;
            margin-top: 2px;
        }
        .badge-ko { background: #e8eeff; color: #3b5bdb; }
        .badge-en { background: #e8f5e9; color: #2e7d32; }
        .result-text { font-size: 15px; color: #222; line-height: 1.6; word-break: break-word; }
    </style>
</head>
<body>

<!-- TTS 섹션 -->
<div class="container">
    <h2>1. 오디오 파일 생성 (TTS)</h2>
    <p style="color:#666; font-size:14px; margin-top:-6px;">텍스트를 입력하면 서버에서 WAV 파일을 생성합니다.</p>
    <textarea id="ttsText">안녕하세요. 오늘 날씨가 참 좋네요.</textarea>
    <button id="ttsBtn" onclick="generateAudio()">오디오 파일 생성</button>
    <div class="status" id="ttsStatus"></div>
</div>

<!-- STT + 번역 섹션 -->
<div class="container">
    <h2>2. STT + 번역</h2>
    <p style="color:#666; font-size:14px; margin-top:-6px;">오디오 파일을 첨부하면 텍스트 변환 + 영어 번역 결과를 반환합니다.</p>

    <div class="file-row">
        <input type="file" id="audioFile" accept="audio/*">
    </div>
    <button id="sttBtn" onclick="transcribeAndTranslate()">변환 + 번역 요청</button>
    <div class="status" id="sttStatus"></div>

    <div class="result-box" id="resultBox">
        <h3>변환 결과</h3>
        <div class="result-card">
            <div class="result-row">
                <span class="lang-badge badge-ko">한국어</span>
                <span class="result-text" id="resultOriginal"></span>
            </div>
            <div class="result-row">
                <span class="lang-badge badge-en">English</span>
                <span class="result-text" id="resultTranslated"></span>
            </div>
        </div>
    </div>
</div>

<script>
    /* 브라우저 세션당 고유 conversationId 자동 생성 (localStorage 유지) */
    function getConversationId() {
        let id = localStorage.getItem('stt_conversation_id');
        if (!id) {
            id = 'user-' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('stt_conversation_id', id);
        }
        return id;
    }

    /* ── TTS ── */
    async function generateAudio() {
        const text = document.getElementById('ttsText').value.trim();
        const status = document.getElementById('ttsStatus');
        const btn = document.getElementById('ttsBtn');
        if (!text) { alert('텍스트를 입력해주세요.'); return; }

        btn.disabled = true;
        status.innerText = '서버에서 음성 생성 중...';
        try {
            const res = await fetch('/api/tts?text=' + encodeURIComponent(text));
            if (!res.ok) throw new Error(await res.text());
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'tts_output.wav';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
            status.innerText = '다운로드 완료! (tts_output.wav)';
        } catch (e) {
            status.innerText = '오류: ' + e.message;
        } finally {
            btn.disabled = false;
        }
    }

    /* ── STT + 번역 ── */
    async function transcribeAndTranslate() {
        const fileInput = document.getElementById('audioFile');
        const status = document.getElementById('sttStatus');
        const resultBox = document.getElementById('resultBox');
        const btn = document.getElementById('sttBtn');

        if (!fileInput.files.length) { alert('오디오 파일을 선택해주세요.'); return; }

        btn.disabled = true;
        status.innerText = '변환 중... (시간이 걸릴 수 있습니다)';
        resultBox.style.display = 'none';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('conversationId', getConversationId());

        try {
            const res = await fetch('/api/audio-translate', { method: 'POST', body: formData });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();

            document.getElementById('resultOriginal').innerText = data.originalText;
            document.getElementById('resultTranslated').innerText = data.translatedText;
            resultBox.style.display = 'block';
            status.innerText = '완료!';
        } catch (e) {
            status.innerText = '오류: ' + e.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
