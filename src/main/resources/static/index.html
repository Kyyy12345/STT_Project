<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STT 테스트용 오디오 파일 생성기</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f6f9; }
        .container { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        #status { margin-top: 20px; color: #333; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>
<div class="container">
    <h2>STT 테스트 파일 생성기</h2>
    <p>텍스트를 입력하면 서버에서 TTS 음성 파일을 생성합니다.</p>
    <textarea id="text">안녕하세요. 오늘 날씨가 참 좋네요.</textarea>
    <br>
    <button id="btn" onclick="generateAudio()">오디오 파일 생성</button>
    <div id="status"></div>
</div>
<script>
    async function generateAudio() {
        const text = document.getElementById('text').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');

        if (!text) { alert('텍스트를 입력해주세요.'); return; }

        btn.disabled = true;
        status.innerText = '서버에서 음성 생성 중...';

        try {
            const res = await fetch('/api/tts?text=' + encodeURIComponent(text));
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tts_output.wav';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            status.innerText = '다운로드 완료! Bruno에서 tts_output.wav 파일을 업로드하세요.';
        } catch (e) {
            status.innerText = '오류: ' + e.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
