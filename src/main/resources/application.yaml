spring:
  application:
    name: STT-project
  ai:
    google:
      genai:
        chat:
          model: gemini-2.5-flash
        api-key: ${GOOGLE_API_KEY}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    error:
      include-message: always

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG

